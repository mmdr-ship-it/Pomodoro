<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZenDoro Studio | Ultimate Edition</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        :root {
            --bg: #000; --text: #fff; --accent: #007AFF;
            --glass: rgba(30, 30, 30, 0.7); --border: rgba(255, 255, 255, 0.1);
        }
        body.theme-dia { --bg: #F5F5F7; --text: #1D1D1F; --glass: rgba(255, 255, 255, 0.8); --border: rgba(0, 0, 0, 0.1); }
        body.theme-atardecer { --bg: #1a0b16; --accent: #ff2d55; }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, sans-serif; }
        body { background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; transition: 1s ease; }
        
        #canvas-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; }

        .ui-wrapper {
            position: relative; z-index: 10; height: 100vh; width: 100%;
            display: grid; grid-template-columns: 280px 1fr 280px; padding: 30px; gap: 20px;
        }

        .panel { 
            background: var(--glass); backdrop-filter: blur(40px); -webkit-backdrop-filter: blur(40px);
            border: 1px solid var(--border); border-radius: 24px; padding: 25px;
            display: flex; flex-direction: column; gap: 15px; pointer-events: all;
        }

        /* TIMER & FRASES */
        .center-content { display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        #timer { font-size: 8rem; font-weight: 100; letter-spacing: -5px; line-height: 1; margin: 10px 0; font-variant-numeric: tabular-nums; }
        
        .quote-container { margin: 20px 0; height: 50px; position: relative; width: 100%; }
        #dynamic-quote { 
            font-size: 14px; text-transform: uppercase; letter-spacing: 3px; opacity: 0.6;
            animation: curveFlow 5s infinite ease-in-out; display: inline-block;
        }
