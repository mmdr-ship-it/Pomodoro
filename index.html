<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZenDoro | Deep Work</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/howler/2.2.3/howler.min.js"></script>
    <style>
        :root {
            --bg: #050505;
            --text: #ffffff;
            --accent: rgba(255, 255, 255, 0.8);
            --dim: rgba(255, 255, 255, 0.2);
            --blur-color: rgba(255, 255, 255, 0.05);
            --transition-speed: 2s;
        }

        body.theme-amanecer { --bg: #0f141a; --blur-color: rgba(255, 100, 50, 0.08); }
        body.theme-dia { --bg: #f5f5f5; --text: #1a1a1a; --dim: rgba(0,0,0,0.2); --blur-color: rgba(0,0,0,0.04); }
        body.theme-tarde { --bg: #1a1005; --blur-color: rgba(255, 150, 0, 0.08); }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', -apple-system, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: background-color var(--transition-speed) ease;
            overflow: hidden;
        }

        /* Esfera de Respiración 3D */
        .orb-container {
            position: absolute;
            z-index: -1;
            filter: blur(80px);
            animation: breathe 10s infinite ease-in-out;
            transition: all 1s ease;
        }
        .orb {
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, var(--blur-color) 0%, transparent 75%);
            border-radius: 50%;
        }

        @keyframes breathe {
            0%, 100% { transform: scale(1); opacity: 0.2; }
            50% { transform: scale(1.6); opacity: 0.6; }
        }

        /* Efecto de Finalización (Flash) */
        .flash-finish {
            animation: finishFlash 1.5s ease-out;
        }
        @keyframes finishFlash {
            0% { background-color: var(--text); }
            100% { background-color: var(--bg); }
        }

        .container { text-align: center; z-index: 10; width: 100%; }
        
        #timer {
            font-size: clamp(5rem, 20vw, 10rem);
            font-weight: 100;
            letter-spacing: -6px;
            line-height: 1;
            margin: 10px 0;
            transition: transform 0.5s ease;
        }

        .estoicismo {
            font-size: 0.75rem;
            color: var(--dim);
            max-width: 400px;
            margin: 30px auto;
            min-height: 40px;
            letter-spacing: 2px;
            text-transform: uppercase;
            transition: opacity 1s;
        }

        .panel { display: flex; gap: 10px; margin: 15px 0; justify-content: center; flex-wrap: wrap; }

        button {
            background: none;
            border: 1px solid var(--dim);
            color: var(--dim);
            padding: 6px 14px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.6rem;
            text-transform: uppercase;
            transition: 0.3s;
        }
        button:hover, button.active { border-color: var(--text); color: var(--text); }

        .dot-container { display: flex; justify-content: center; gap: 6px; margin-bottom: 20px; }
        .dot { width: 4px; height: 4px; border-radius: 50%; background: var(--dim); transition: 0.5s; }
        .dot.filled { background: var(--text); box-shadow: 0 0 8px var(--text); transform: scale(1.5); }

        select {
            background: none; color: var(--dim); border: 1px solid var(--dim);
            padding: 5px; border-radius: 15px; font-size: 0.6rem; text-transform: uppercase; outline: none;
        }

        .main-toggle { font-size: 1.2rem; border: none; margin-top: 40px; color: var(--text); opacity: 0.5; }
        .main-toggle:hover { opacity: 1; }

        .legal-tag { position: absolute; bottom: 20px; font-size: 0.5rem; color: var(--dim); letter-spacing: 2px; }
    </style>
</head>
<body class="theme-noche">

    <div class="orb-container" id="orb"><div class="orb"></div></div>

    <div class="container">
        <div id="sessionDots" class="dot-container"></div>
        <div id="timer">25:00</div>
        <div id="quote" class="estoicismo">"La paciencia es amarga, pero su fruto es dulce."</div>

        <div class="panel">
            <button onclick="setT(25)" class="active" id="b25">25</button>
            <button onclick="setT(50)" id="b50">50</button>
            <button onclick="setT(90)" id="b90">90</button>
            <button onclick="setT(5)" id="b5">Rest</button>
        </div>

        <div class="panel">
            <select id="ambientSelect" onchange="changeAmbient()">
                <option value="none">🔇 Silencio</option>
                <option value="rain">🌧️ Lluvia</option>
                <option value="waves">🌊 Mar</option>
                <option value="forest">🍃 Bosque</option>
                <option value="cafe">☕ Biblioteca</option>
            </select>
            <select onchange="document.body.className = 'theme-' + this.value">
                <option value="noche">🌙 Noche</option>
                <option value="amanecer">🌅 Amanecer</option>
                <option value="dia">☀️ Día</option>
                <option value="tarde">🌇 Tarde</option>
            </select>
        </div>

        <button class="main-toggle" id="startBtn" onclick="toggle()">START</button>
    </div>

    <div class="legal-tag">ZENDORO // LOCAL FOCUS TOOL // NO DATA COLLECTED</div>

    <script>
        let timeLeft = 25 * 60;
        let timerId = null;
        let isRunning = false;
        let ambientSound = null;

        const quotes = [
            "El hombre conquista el mundo conquistándose a sí mismo.",
            "No expliques tu filosofía, encárnala.",
            "La mejor respuesta a la ira es el silencio.",
            "Tú tienes poder sobre tu mente, no sobre los eventos externos.",
            "La dificultad es lo que despierta al genio."
        ];

        // Sonidos externos (Créditos a sus autores originales en plataformas de libre uso)
        const sounds = {
            bell: new Howl({ src: ['https://assets.mixkit.co/active_storage/sfx/1070/1070-preview.mp3'], volume: 0.6 }),
            rain: new Howl({ src: ['https://www.soundjay.com/nature/sounds/rain-01.mp3'], loop: true, volume: 0.3 }),
            waves: new Howl({ src: ['https://www.soundjay.com/nature/sounds/ocean-wave-1.mp3'], loop: true, volume: 0.3 }),
            forest: new Howl({ src: ['https://www.soundjay.com/nature/sounds/forest-1.mp3'], loop: true, volume: 0.3 }),
            cafe: new Howl({ src: ['https://www.soundjay.com/misc/sounds/coffee-shop-1.mp3'], loop: true, volume: 0.3 })
        };

        function setT(m) {
            clearInterval(timerId); isRunning = false;
            timeLeft = m * 60;
            updateDisp();
            document.querySelectorAll('.panel button').forEach(b => b.classList.remove('active'));
            if(event) event.target.classList.add('active');
            document.getElementById('startBtn').innerText = "START";
        }

        function updateDisp() {
            let m = Math.floor(timeLeft / 60);
            let s = timeLeft % 60;
            document.getElementById('timer').innerText = `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
        }

        function toggle() {
            if(isRunning) {
                clearInterval(timerId);
                document.getElementById('startBtn').innerText = "RESUME";
            } else {
                timerId = setInterval(() => {
                    timeLeft--;
                    updateDisp();
                    if(timeLeft % 300 === 0) changeQuote();
                    if(timeLeft <= 0) finishSession();
                }, 1000);
                document.getElementById('startBtn').innerText = "PAUSE";
            }
            isRunning = !isRunning;
        }

        function finishSession() {
            clearInterval(timerId);
            isRunning = false;
            sounds.bell.play();
            document.body.classList.add('flash-finish');
            setTimeout(() => document.body.classList.remove('flash-finish'), 1500);
            
            const dot = document.createElement('div');
            dot.className = 'dot filled';
            document.getElementById('sessionDots').appendChild(dot);
            
            document.getElementById('startBtn').innerText = "RESTART";
            document.getElementById('timer').innerText = "DONE";
        }

        function changeQuote() {
            const el = document.getElementById('quote');
            el.style.opacity = 0;
            setTimeout(() => { 
                el.innerText = `"${quotes[Math.floor(Math.random()*quotes.length)]}"`; 
                el.style.opacity = 1; 
            }, 1000);
        }

        function changeAmbient() {
            if(ambientSound) ambientSound.stop();
            const val = document.getElementById('ambientSelect').value;
            if(val !== 'none') {
                ambientSound = sounds[val];
                ambientSound.play();
            }
        }
    </script>
</body>
</html>
