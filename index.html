<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZenDoro Studio | Fixed Edition</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        :root {
            --bg: #000; --text: #fff; --accent: #007AFF;
            --glass: rgba(20, 20, 20, 0.75); --border: rgba(255, 255, 255, 0.12);
        }
        body.theme-dia { --bg: #F5F5F7; --text: #1D1D1F; --glass: rgba(255, 255, 255, 0.85); --border: rgba(0, 0, 0, 0.1); }
        body.theme-atardecer { --bg: #150a1f; --accent: #ff007f; }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, "SF Pro Display", sans-serif; }
        body { background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; transition: 0.8s ease; }
        
        #canvas-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }

        .app-layout {
            position: relative; z-index: 10; height: 100vh; width: 100%;
            display: grid; grid-template-columns: 280px 1fr 280px; padding: 30px; gap: 25px;
            pointer-events: none; /* Para no interferir con clicks de fondo si hubiera */
        }
        .panel { 
            pointer-events: auto;
            background: var(--glass); backdrop-filter: blur(40px); -webkit-backdrop-filter: blur(40px);
            border: 1px solid var(--border); border-radius: 28px; padding: 30px;
            display: flex; flex-direction: column; gap: 15px;
        }

        h3 { font-size: 10px; text-transform: uppercase; letter-spacing: 2px; opacity: 0.4; margin-bottom: 5px; }
        #timer { font-size: 8rem; font-weight: 100; letter-spacing: -6px; margin: 15px 0; font-variant-numeric: tabular-nums; }
        
        button, select {
            background: rgba(255,255,255,0.06); border: 1px solid var(--border);
            color: var(--text); padding: 14px; border-radius: 14px; font-size: 12px;
            cursor: pointer; transition: 0.2s; width: 100%; text-align: left;
        }
        button:hover { background: rgba(255,255,255,0.12); border-color: var(--accent); }
        button.active { background: var(--accent) !important; color: #fff !important; border: none; }

        .main-btn { 
            font-size: 1.4rem; background: var(--text); color: var(--bg); border: none;
            text-align: center; font-weight: 400; letter-spacing: 5px; margin-top: 30px;
            border-radius: 18px; padding: 18px; cursor: pointer; pointer-events: auto;
        }

        .center { display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; pointer-events: none; }
        
        .fs-btn {
            position: fixed; bottom: 30px; right: 30px; z-index: 100;
            width: 45px; height: 45px; border-radius: 50%; border: 1px solid var(--border);
            background: var(--glass); color: var(--text); cursor: pointer; backdrop-filter: blur(10px);
        }
    </style>
</head>
<body class="theme-noche">

    <div id="canvas-container"></div>
    <button class="fs-btn" onclick="toggleFullscreen()">⛶</button>

    <main class="app-layout">
        <aside class="panel">
            <h3>Visual Studio</h3>
            <button onclick="changeMode('pulse', this)" class="v-btn active">Pulso Atómico</button>
            <button onclick="changeMode('blackhole', this)" class="v-btn">Agujero Negro</button>
            <button onclick="changeMode('dna', this)" class="v-btn">ADN Helix</button>
            <button onclick="changeMode('vortex', this)" class="v-btn">Vórtice Espacial</button>
            <button onclick="changeMode('storm', this)" class="v-btn">Tormenta Pro</button>
        </aside>

        <section class="center">
            <div id="timer">25:00</div>
            <div style="width: 300px;">
                <button class="main-btn" id="startBtn" onclick="toggleTimer()">START</button>
            </div>
        </section>

        <aside class="panel">
            <h3>Focus</h3>
            <button onclick="setTimer(25, this)" class="t-btn active">25m Soft</button>
            <button onclick="setTimer(45, this)" class="t-btn">45m Focus</button>
            <button onclick="setTimer(90, this)" class="t-btn">90m Deep</button>

            <h3 style="margin-top:15px">Rest</h3>
            <div style="display: flex; gap: 5px;">
                <button onclick="setTimer(5, this)" class="t-btn">5m</button>
                <button onclick="setTimer(15, this)" class="t-btn">15m</button>
            </div>

            <h3 style="margin-top:15px">Theme</h3>
            <select onchange="document.body.className='theme-'+this.value">
                <option value="noche">Midnight</option>
                <option value="dia">Studio Light</option>
                <option value="atardecer">Twilight</option>
            </select>
        </aside>
    </main>

    <script>
        // --- MOTOR 3D ---
        let scene, camera, renderer, points, geometry;
        let currentMode = 'pulse';
        const pCount = 6000;

        function init3D() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            geometry = new THREE.BufferGeometry();
            const positions = new Float32Array(pCount * 3);
            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            
            const mat = new THREE.PointsMaterial({ size: 0.035, color: 0x007AFF, transparent: true, opacity: 0.7 });
            points = new THREE.Points(geometry, mat);
            scene.add(points);
            camera.position.z = 5;
            animate();
        }

        function animate() {
            requestAnimationFrame(animate);
            const time = Date.now() * 0.001;
            const pos = geometry.attributes.position.array;

            for(let i=0; i<pCount; i++) {
                const i3 = i * 3;
                const r = i / pCount;
                const a = r * Math.PI * 2;

                if(currentMode === 'pulse') {
                    const s = 2 + Math.sin(time + r * 10) * 0.4;
                    pos[i3] = Math.cos(a) * s;
                    pos[i3+1] = Math.sin(a) * s;
                    pos[i3+2] = Math.cos(time + r * 5);
                } else if(currentMode === 'blackhole') {
                    const d = (i % 60) * 0.08;
                    pos[i3] = Math.cos(a + time * (1 + d)) * d;
                    pos[i3+1] = Math.sin(a + time * (1 + d)) * d;
                    pos[i3+2] = Math.sin(d - time) * 1.5;
                } else if(currentMode === 'dna') {
                    const h = (r - 0.5) * 6;
                    const side = i % 2 === 0 ? 1 : -1;
                    pos[i3] = Math.cos(h + time) * side;
                    pos[i3+1] = h;
                    pos[i3+2] = Math.sin(h + time) * side;
                } else if(currentMode === 'vortex') {
                    const rad = (i % 80) * 0.05;
                    pos[i3] = Math.cos(a + time * 2) * rad;
                    pos[i3+1] = Math.sin(a + time * 2) * rad;
                    pos[i3+2] = (i / 80) - 20;
                } else {
                    pos[i3] = Math.sin(a * 2) * 2;
                    pos[i3+1] = Math.cos(a + time) * 2;
                    pos[i3+2] = Math.sin(time + i) * 0.5;
                }
            }
            geometry.attributes.position.needsUpdate = true;
            renderer.render(scene, camera);
        }

        // --- LOGICA POMODORO ---

            const btn = document.getElementById('startBtn');
            if(isRunning) {
                clearInterval(timerId);
                btn.innerText = "RESUME";
                isRunning = false;
