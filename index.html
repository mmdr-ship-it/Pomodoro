<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZenDoro | Visual Masterpiece</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        :root {
            --bg: #000; --text: #fff; --accent: #007AFF;
            --glass: rgba(15, 15, 15, 0.7); --border: rgba(255, 255, 255, 0.12);
        }
        body.theme-dia { --bg: #F5F5F7; --text: #1D1D1F; --glass: rgba(255, 255, 255, 0.8); --border: rgba(0, 0, 0, 0.1); }
        body.theme-atardecer { --bg: #150a1f; --accent: #ff007f; }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, "SF Pro Display", sans-serif; }
        body { background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; transition: 1s ease; }
        
        #canvas-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; }

        .app-layout {
            position: relative; z-index: 10; height: 100vh; width: 100%;
            display: grid; grid-template-columns: 280px 1fr 280px; padding: 30px; gap: 25px;
            transition: opacity 0.5s ease;
        }

        /* Ocultar interfaz en pantalla completa si se desea modo zen puro */
        .app-layout.zen-mode { opacity: 0; cursor: none; }

        .panel { 
            background: var(--glass); backdrop-filter: blur(50px); -webkit-backdrop-filter: blur(50px);
            border: 1px solid var(--border); border-radius: 28px; padding: 30px;
            display: flex; flex-direction: column; gap: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        h3 { font-size: 11px; text-transform: uppercase; letter-spacing: 2px; opacity: 0.4; }
        #timer { font-size: 8.5rem; font-weight: 100; letter-spacing: -6px; margin: 10px 0; font-variant-numeric: tabular-nums; }
        .quote { font-size: 14px; opacity: 0.5; font-weight: 300; letter-spacing: 0.5px; }

        button, select {
            background: rgba(255,255,255,0.06); border: 1px solid var(--border);
            color: var(--text); padding: 15px; border-radius: 16px; font-size: 12px;
            cursor: pointer; transition: all 0.3s cubic-bezier(0.2, 0, 0.2, 1); 
            width: 100%; text-align: left; font-weight: 500;
        }
        button:hover { background: rgba(255,255,255,0.15); transform: translateY(-2px); border-color: var(--accent); }
        button.active { background: var(--accent); color: #fff; border: none; box-shadow: 0 10px 20px rgba(0, 122, 255, 0.3); }

        .main-btn { 
            font-size: 1.5rem; background: var(--text); color: var(--bg); border: none;
            text-align: center; font-weight: 400; letter-spacing: 6px; margin-top: 40px;
            border-radius: 20px; padding: 20px;
        }

        .fullscreen-btn {
            position: fixed; bottom: 30px; right: 30px; z-index: 100;
            width: 50px; height: 50px; border-radius: 50%; display: flex;
            align-items: center; justify-content: center; background: var(--glass);
            border: 1px solid var(--border); cursor: pointer; color: var(--text);
        }

        .center { display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        
        /* Custom Select Styling */
        select { appearance: none; position: relative; }
    </style>
</head>
<body class="theme-noche">

    <div id="canvas-container"></div>
    <button class="fullscreen-btn" onclick="toggleFullscreen()" title="Pantalla Completa (ESC para salir)">⛶</button>

    <main class="app-layout" id="main-layout">
        <aside class="panel">
            <h3>Visual Experience</h3>
            <button onclick="changeMode('blackhole')" class="v-btn">Agujero Negro</button>
            <button onclick="changeMode('storm')" class="v-btn">Tormenta Eléctrica</button>
            <button onclick="changeMode('dna')" class="v-btn">ADN Fractal</button>
            <button onclick="changeMode('vortex')" class="v-btn">Vórtice 3D</button>
            <button onclick="changeMode('pulse')" class="v-btn active">Pulso Atómico</button>
            <button onclick="changeMode('strings')" class="v-btn">Cuerdas Cinéticas</button>
        </aside>

        <section class="center">
            <div id="timer">25:00</div>
            <div id="quote" class="quote">ESTADO DE FLUJO PURO</div>
            <div style="width: 320px;">
                <button class="main-btn" id="startBtn" onclick="toggleTimer()">START</button>
            </div>
        </section>

        <aside class="panel">
            <h3>Sessions</h3>
            <button onclick="setTimer(25, this)" class="t-btn active">25m Soft Focus</button>
            <button onclick="setTimer(45, this)" class="t-btn">45m Focus</button>
            <button onclick="setTimer(90, this)" class="t-btn">90m Deep Work</button>

            <h3>Rest</h3>
            <div style="display: flex; gap: 8px;">
                <button onclick="setTimer(5, this)" class="t-btn">5m</button>
                <button onclick="setTimer(10, this)" class="t-btn">10m</button>
                <button onclick="setTimer(15, this)" class="t-btn">15m</button>
            </div>

            <h3 style="margin-top:20px">Atmosphere</h3>
            <select onchange="document.body.className='theme-'+this.value">
                <option value="noche">Midnight OLED</option>
                <option value="dia">Studio Light</option>
                <option value="atardecer">Hyper Pink</option>
            </select>
        </aside>
    </main>

    <script>
        // --- ENGINE 3D DE ALTA PERFORMANCE ---
        let scene, camera, renderer, points, geometry, positions, colors;
        let currentMode = 'pulse';
        const particleCount = 8000;

        function init3D() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            geometry = new THREE.BufferGeometry();
            positions = new Float32Array(particleCount * 3);
            colors = new Float32Array(particleCount * 3);
            
            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
            
            const mat = new THREE.PointsMaterial({ 
                size: 0.04, 
                vertexColors: true, 
                transparent: true, 
                opacity: 0.8,
                blending: THREE.AdditiveBlending 
            });
            
            points = new THREE.Points(geometry, mat);
            scene.add(points);
            camera.position.z = 5;
            animate();
        }

        function animate() {
            requestAnimationFrame(animate);
            const time = Date.now() * 0.001;
            const pos = geometry.attributes.position.array;
            const col = geometry.attributes.color.array;
            const accentColor = new THREE.Color(getComputedStyle(document.body).getPropertyValue('--accent'));

            for(let i=0; i<particleCount; i++) {
                const i3 = i * 3;
                const ratio = i / particleCount;
                const angle = ratio * Math.PI * 2;
                
                let x, y, z;

                switch(currentMode) {
                    case 'pulse':
                        const p = 2 + Math.sin(time * 2 + ratio * 10) * 0.5;
                        x = Math.cos(angle) * Math.sin(ratio * 50) * p;
                        y = Math.sin(angle) * Math.sin(ratio * 50) * p;
                        z = Math.cos(ratio * 100 + time) * 0.5;
                        break;
                    case 'blackhole':
                        const dist = (i % 50) * 0.1;
                        const speed = time * (1 + dist);
                        x = Math.cos(angle + speed) * dist;
                        y = Math.sin(angle + speed) * dist;
                        z = Math.sin(dist - time) * 2;
                        break;
                    case 'storm':
                        x = Math.sin(angle * 2) * 2 + Math.random() * 0.1;
                        y = Math.cos(angle * 3 + time) * 2;
                        z = Math.sin(time + i) * 0.5;
                        break;
                    case 'dna':
                        const h = (ratio - 0.5) * 6;
                        const side = i % 2 === 0 ? 1 : -1;
                        x = Math.cos(h + time) * side;
                        y = h;
                        z = Math.sin(h + time) * side;
                        break;
                    case 'vortex':
                        const vRadius = (i % 100) * 0.04;
                        x = Math.cos(angle + time + vRadius) * vRadius * 2;
                        y = Math.sin(angle + time + vRadius) * vRadius * 2;
                        z = (i / 100) - 40; // Profundidad infinita
                        break;
                    case 'strings':
                        x = Math.tan(angle + time * 0.1) * 0.5;
                        y = Math.sin(angle * 10 + time) * 2;
                        z = Math.cos(angle * 5 + time) * 1;
                        break;
