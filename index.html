<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZenDoro Studio | Nature</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/howler/2.2.3/howler.min.js"></script>
    <style>
        :root {
            --bg: #000000; --text: #ffffff; --accent: #ffffff;
            --glass: rgba(255, 255, 255, 0.08); --border: rgba(255, 255, 255, 0.15);
        }

        /* TEMAS APPLE ATMOSPHERE */
        body.theme-noche { --bg: #050505; --accent: #ffffff; }
        body.theme-dia { --bg: #f5f5f7; --text: #1d1d1f; --accent: #0071e3; --glass: rgba(0,0,0,0.03); --border: rgba(0,0,0,0.1); }
        body.theme-nublado { --bg: #3a3d42; --accent: #d1d5db; --text: #f9fafb; }
        body.theme-lluvia { --bg: #1e293b; --accent: #60a5fa; --text: #e0e7ff; }
        body.theme-amanecer { --bg: #1a1410; --accent: #ff8c5a; }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        body {
            background-color: var(--bg); color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
            height: 100vh; display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            transition: background 2s cubic-bezier(0.4, 0, 0.2, 1); overflow: hidden;
        }

        .visual-container { position: absolute; z-index: -1; display: flex; justify-content: center; align-items: center; }
        .orb { 
            width: 320px; height: 320px; border-radius: 50%; 
            transition: all 1.2s ease; animation: breathe 10s infinite ease-in-out; 
        }

        .mode-neblina { background: radial-gradient(circle, var(--accent) 0%, transparent 70%); filter: blur(70px); opacity: 0.4; }
        .mode-anillo { border: 2px solid var(--accent); box-shadow: 0 0 30px rgba(255,255,255,0.1); opacity: 0.6; }

        @keyframes breathe {
            0%, 100% { transform: scale(0.95); opacity: 0.3; }
            50% { transform: scale(1.5); opacity: 0.6; }
        }

        .ui-content { text-align: center; z-index: 10; width: 90%; max-width: 500px; }
        #timer { font-size: 8rem; font-weight: 200; letter-spacing: -5px; line-height: 1; margin-bottom: 20px; font-variant-numeric: tabular-nums; }
        .quote-box { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 2px; opacity: 0.5; margin: 30px 0; min-height: 40px; }
        
        .controls { display: flex; gap: 10px; justify-content: center; margin-bottom: 15px; flex-wrap: wrap; }
        button, select {
            background: var(--glass); border: 1px solid var(--border); color: var(--text);
            padding: 10px 16px; border-radius: 14px; font-size: 0.65rem; font-weight: 600;
            text-transform: uppercase; letter-spacing: 1px; cursor: pointer; backdrop-filter: blur(12px); transition: 0.3s;
        }
        button.active { background: var(--text); color: var(--bg); border: none; }
        .start-btn { font-size: 1.3rem; background: none; border: none; margin-top: 40px; font-weight: 200; letter-spacing: 5px; cursor: pointer; color: var(--text); opacity: 0.6; }
        .start-btn:hover { opacity: 1; }

        .dot-box { display: flex; justify-content: center; gap: 8px; margin-bottom: 20px; }
        .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--border); }
        .dot.active { background: var(--accent); box-shadow: 0 0 10px var(--accent); }
    </style>
</head>
<body class="theme-noche">

    <div class="visual-container"><div id="orb" class="orb mode-neblina"></div></div>

    <div class="ui-content">
        <div id="sessionDots" class="dot-box"></div>
        <div id="timer">25:00</div>
        <div id="quote" class="quote-box">Respiración profunda. Enfoque puro.</div>

        <div class="controls">
            <button onclick="setT(25)" class="active">25</button>
            <button onclick="setT(50)">50</button>
            <button onclick="setT(90)">90</button>
            <button onclick="setT(5)">Rest</button>
        </div>

        <div class="controls">
            <select id="audioSelect" onchange="changeAudio()">
                <option value="none">🔇 Silencio</option>
                <option value="lluvia">🌧️ Lluvia Pacífica</option>
                <option value="mar">🌊 Mar Profundo</option>
                <option value="naturaleza">🍃 Naturaleza</option>
                <option value="zen">🧘 Sonido Zen</option>
                <option value="ruido">🌫️ Ruido Blanco</option>
            </select>
            <select onchange="document.body.className = 'theme-' + this.value">
                <option value="noche">Midnight</option>
                <option value="dia">Studio Light</option>
                <option value="nublado">Cloudy Gray</option>
                <option value="lluvia">Rainy Blue</option>
                <option value="amanecer">Sunrise</option>
            </select>
            <button onclick="toggleVisual()">Visual</button>
        </div>

        <button class="start-btn" id="startBtn" onclick="toggle()">START</button>
    </div>

    <script>
        let timeLeft = 25 * 60, timerId = null, isRunning = false;
        let activeSound = null;

        const sounds = {
            lluvia: 'https://assets.mixkit.co/active_storage/sfx/2520/2520-preview.mp3', // Lluvia suave
            mar: 'https://www.soundjay.com/nature/sounds/ocean-wave-1.mp3',
            naturaleza: 'https://www.soundjay.com/nature/sounds/forest-1.mp3',
            zen: 'https://assets.mixkit.co/active_storage/sfx/1074/1074-preview.mp3', // Campana/cuenco
            ruido: 'https://www.soundjay.com/misc/sounds/white-noise-1.mp3',
            bell: 'https://assets.mixkit.co/active_storage/sfx/1070/1070-preview.mp3'
        };

        function changeAudio() {
            if (activeSound) activeSound.stop();
            const val = document.getElementById('audioSelect').value;
            if (val !== 'none' && isRunning) {
                activeSound = new Howl({ src: [sounds[val]], loop: true, volume: 0.5 });
                activeSound.play();
            }
        }

        function toggleVisual() {
            const orb = document.getElementById('orb');
            orb.classList.toggle('mode-neblina');
            orb.classList.toggle('mode-anillo');
        }

        function setT(m) {
            clearInterval(timerId); isRunning = false;
            timeLeft = m * 60; updateDisp();
            document.querySelectorAll('.controls button').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById('startBtn').innerText = "START";
        }

        function updateDisp() {
            let m = Math.floor(timeLeft / 60), s = timeLeft % 60;
            document.getElementById('timer').innerText = `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
        }

        function toggle() {
            if(isRunning) {
                clearInterval(timerId); if (activeSound) activeSound.pause();
                document.getElementById('startBtn').innerText = "RESUME";
            } else {
                changeAudio();
                timerId = setInterval(() => {
                    timeLeft--; updateDisp();
                    if(timeLeft <= 0) { 
                        clearInterval(timerId); 
                        new Howl({ src: [sounds.bell] }).play();
                        document.getElementById('sessionDots').innerHTML += '<div class="dot active"></div>';
                    }
                }, 1000);
                document.getElementById('startBtn').innerText = "PAUSE";
            }
            isRunning = !isRunning;
        }
    </script>
</body>
</html>
