<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZenDoro Studio Pro | Visual Mastery</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        :root {
            --bg: #000; --text: #fff; --accent: #007AFF;
            --glass: rgba(25, 25, 25, 0.8); --border: rgba(255, 255, 255, 0.1);
        }
        body.theme-dia { --bg: #F5F5F7; --text: #1D1D1F; --glass: rgba(255, 255, 255, 0.85); --border: rgba(0, 0, 0, 0.1); }
        body.theme-atardecer { --bg: #150a1f; --accent: #ff007f; }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif; }
        body { background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; transition: 1s; }
        
        #canvas-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }

        .app-layout {
            position: relative; z-index: 10; height: 100vh; width: 100%;
            display: grid; grid-template-columns: 280px 1fr 280px; padding: 30px; gap: 20px;
            pointer-events: none;
        }

        .panel { 
            pointer-events: auto; background: var(--glass); backdrop-filter: blur(50px);
            border: 1px solid var(--border); border-radius: 28px; padding: 30px;
            display: flex; flex-direction: column; gap: 12px; box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }

        h3 { font-size: 10px; text-transform: uppercase; letter-spacing: 2px; opacity: 0.5; margin-bottom: 10px; }
        #timer { font-size: 8.5rem; font-weight: 100; letter-spacing: -6px; margin: 20px 0; font-variant-numeric: tabular-nums; }
        
        button {
            background: rgba(255,255,255,0.06); border: 1px solid var(--border);
            color: var(--text); padding: 14px; border-radius: 16px; font-size: 12px;
            cursor: pointer; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); width: 100%; text-align: left;
        }
        button:hover { background: rgba(255,255,255,0.15); transform: translateY(-2px); }
        button.active { background: var(--accent) !important; color: white !important; border: none; box-shadow: 0 0 15px var(--accent); }

        .main-btn { 
            pointer-events: auto; font-size: 1.5rem; background: var(--text); color: var(--bg);
            text-align: center; font-weight: 300; letter-spacing: 5px; margin-top: 30px;
            border-radius: 20px; padding: 20px; border: none; cursor: pointer;
        }

        .center { display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; pointer-events: none; }
        
        .fs-btn {
            position: fixed; bottom: 30px; right: 30px; z-index: 100;
            width: 45px; height: 45px; border-radius: 50%; border: 1px solid var(--border);
            background: var(--glass); color: var(--text); cursor: pointer; display: flex; align-items: center; justify-content: center;
        }
    </style>
</head>
<body class="theme-noche">

    <div id="canvas-container"></div>
    <button class="fs-btn" onclick="toggleFullscreen()">⛶</button>

    <main class="app-layout">
        <aside class="panel">
            <h3>Visual Studio</h3>
            <button onclick="changeVisual('vortex', this)" class="v-btn active">🌀 Vórtice 3D</button>
            <button onclick="changeVisual('pulse', this)" class="v-btn">⚛️ Pulso Atómico</button>
            <button onclick="changeVisual('dna', this)" class="v-btn">🧬 ADN Helix</button>
            <button onclick="changeVisual('storm', this)" class="v-btn">⚡ Tormenta</button>
        </aside>

        <section class="center">
            <div id="timer">25:00</div>
            <div style="width: 320px;">
                <button class="main-btn" id="startBtn" onclick="toggleTimer()">START</button>
            </div>
        </section>

        <aside class="panel">
            <h3>Sessions</h3>
            <button onclick="setTimer(25, this)" class="t-btn active">25m Soft</button>
            <button onclick="setTimer(45, this)" class="t-btn">45m Focus</button>
            <button onclick="setTimer(90, this)" class="t-btn">90m Deep</button>
            <h3 style="margin-top:10px">Rest</h3>
            <div style="display: flex; gap: 8px;">
                <button onclick="setTimer(5, this)" class="t-btn">5m</button>
                <button onclick="setTimer(15, this)" class="t-btn">15m</button>
            </div>
            <h3 style="margin-top:10px">Theme</h3>
            <select onchange="document.body.className='theme-'+this.value" style="background:none; color:inherit; border:1px solid var(--border); padding:10px; border-radius:10px;">
                <option value="noche">Midnight</option>
                <option value="dia">Studio Light</option>
                <option value="atardecer">Twilight</option>
            </select>
        </aside>
    </main>

    <script>
        let scene, camera, renderer, particles, geometry;
        let currentMode = 'vortex';
        const pCount = 5000;

        // --- INICIALIZACIÓN 3D ---
        function init3D() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            geometry = new THREE.BufferGeometry();
            const positions = new Float32Array(pCount * 3);
            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            
            const mat = new THREE.PointsMaterial({ size: 0.03, color: 0x007AFF, transparent: true, opacity: 0.8 });
            particles = new THREE.Points(geometry, mat);
            scene.add(particles);
            camera.position.z = 5;
            animate();
        }

        function animate() {
            requestAnimationFrame(animate);
            const time = Date.now() * 0.001;
            const pos = geometry.attributes.position.array;

            for (let i = 0; i < pCount; i++) {
                const i3 = i * 3;
                const angle = (i / pCount) * Math.PI * 2;
                const r = i / pCount;

                if (currentMode === 'vortex') {
                    const dist = (i % 100) * 0.05;
                    pos[i3] = Math.cos(angle + time + dist) * dist;
                    pos[i3+1] = Math.sin(angle + time + dist) * dist;
                    pos[i3+2] = (i / 100) - 20;
                } else if (currentMode === 'pulse') {
                    const s = 2 + Math.sin(time * 2 + r * 10) * 0.5;
                    pos[i3] = Math.cos(angle) * s;
                    pos[i3+1] = Math.sin(angle) * s;
                    pos[i3+2] = Math.cos(time + r * 5);
                } else if (currentMode === 'dna') {
                    const h = (r - 0.5) * 8;
                    const side = i % 2 === 0 ? 1 : -1;
                    pos[i3] = Math.cos(h + time) * side * 1.5;
                    pos[i3+1] = h;
                    pos[i3+2] = Math.sin(h + time) * side * 1.5;
                } else if (currentMode === 'storm') {
                    pos[i3] = Math.tan(angle + time * 0.1) * 0.5;
                    pos[i3+1] = Math.sin(angle * 10 + time) * 2;
                    pos[i3+2] = Math.cos(angle * 5 + time) * 1;
                }
            }
            geometry.attributes.position.needsUpdate = true;
            particles.rotation.y += 0.001;
            renderer.render(scene, camera);
        }

        // --- LÓGICA POMODORO ---
        let timeLeft = 25 * 60, isRunning = false, timerId = null;

        function toggleTimer() {
            const btn = document.getElementById('startBtn');
