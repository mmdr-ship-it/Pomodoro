<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZenDoro Studio | Pro Audio</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        :root {
            --bg: #000; --text: #fff; --accent: #007AFF;
            --panel: rgba(28, 28, 30, 0.6); --border: rgba(255, 255, 255, 0.1);
        }
        body.theme-dia { --bg: #F5F5F7; --text: #1D1D1F; --panel: rgba(255, 255, 255, 0.7); --border: rgba(0, 0, 0, 0.1); }
        body.theme-atardecer { --bg: #1c151b; --accent: #FF3B30; }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, sans-serif; }
        body { background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; transition: 1.5s; }
        
        #canvas-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }

        .app-layout {
            position: relative; z-index: 10; height: 100vh; width: 100%;
            display: grid; grid-template-columns: 260px 1fr 280px; padding: 25px; gap: 20px;
        }

        .panel { 
            background: var(--panel); backdrop-filter: blur(40px); -webkit-backdrop-filter: blur(40px);
            border: 1px solid var(--border); border-radius: 24px; padding: 25px;
            display: flex; flex-direction: column; gap: 15px; box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }

        h3 { font-size: 10px; text-transform: uppercase; letter-spacing: 1.5px; opacity: 0.5; }
        #timer { font-size: 8rem; font-weight: 200; letter-spacing: -5px; margin: 10px 0; font-variant-numeric: tabular-nums; }
        .quote { font-size: 13px; opacity: 0.6; line-height: 1.4; max-width: 300px; }

        button, select {
            background: rgba(255,255,255,0.05); border: 1px solid var(--border);
            color: var(--text); padding: 14px; border-radius: 14px; font-size: 12px;
            cursor: pointer; transition: 0.3s; width: 100%; text-align: left;
        }
        button:hover { background: rgba(255,255,255,0.12); border-color: var(--accent); }
        button.active { background: var(--text); color: var(--bg); font-weight: 700; border: none; }

        .main-btn { 
            font-size: 1.4rem; background: var(--accent); color: #fff; border: none;
            text-align: center; font-weight: 300; letter-spacing: 4px; margin-top: 30px;
            box-shadow: 0 0 20px rgba(0, 122, 255, 0.3);
        }

        .center { display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
    </style>
</head>
<body class="theme-noche">

    <div id="canvas-container"></div>

    <main class="app-layout">
        <aside class="panel">
            <h3>Visual Studio Pro</h3>
            <button onclick="setMode('flux')" class="v-btn active">Flujo de Cuerdas</button>
            <button onclick="setMode('vortex')" class="v-btn">Vórtice 3D</button>
            <button onclick="setMode('pulse')" class="v-btn">Pulso Atómico</button>
        </aside>

        <section class="center">
            <div id="timer">25:00</div>
            <div id="quote" class="quote">"El tiempo es el recurso más valioso."</div>
            <div style="width: 300px;">
                <button class="main-btn" id="startBtn" onclick="toggleTimer()">START</button>
            </div>
        </section>

        <aside class="panel">
            <h3>Focus Session</h3>
            <button onclick="setTimer(25, this)" class="t-btn active">25m Soft Focus</button>
            <button onclick="setTimer(45, this)" class="t-btn">45m Focus</button>
            <button onclick="setTimer(90, this)" class="t-btn">90m Deep Work</button>

            <h3>Rest Break</h3>
            <select id="restSelect">
                <option value="5">5m Micro Rest</option>
                <option value="10">10m Recovery</option>
                <option value="15">15m Long Break</option>
            </select>

            <h3 style="margin-top:15px">Soundscape</h3>
            <select id="soundSelect" onchange="updateAtmosphere()">
                <option value="none">Silence</option>
                <option value="white">Puro White Noise</option>
                <option value="zen">Zen Frequency (432Hz)</option>
            </select>

            <select onchange="document.body.className='theme-'+this.value" style="margin-top:10px">
                <option value="noche">Midnight</option>
                <option value="dia">Studio Light</option>
                <option value="atardecer">Twilight</option>
            </select>
        </aside>
    </main>

    <script>
        // --- MOTOR DE AUDIO (GENERATIVO) ---
        let audioCtx, noiseNode, gainNode;

        function initAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        function playAtmosphere(type) {
            stopAtmosphere();
            if (type === 'none') return;

            const bufferSize = audioCtx.sampleRate * 2;
            const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const data = buffer.getChannelData(0);

            if (type === 'white') {
                for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
            } else {
                for (let i = 0; i < bufferSize; i++) data[i] = Math.sin(i * 0.01) * Math.random();
            }

            noiseNode = audioCtx.createBufferSource();
            noiseNode.buffer = buffer;
            noiseNode.loop = true;
            gainNode = audioCtx.createGain();
            gainNode.gain.value = 0.02;
            noiseNode.connect(gainNode).connect(audioCtx.destination);
            noiseNode.start();
        }

        function stopAtmosphere() { if(noiseNode) { noiseNode.stop(); noiseNode = null; } }

        function playFinishBell() {
            const osc = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            osc.type = 'sine'; osc.frequency.setValueAtTime(523.25, audioCtx.currentTime);
            g.gain.setValueAtTime(0.5, audioCtx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 3);
            osc.connect(g).connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 3);
        }

        // --- MOTOR 3D REFINADO ---
        let scene, camera, renderer, points, geometry;
        let currentMode = 'flux';
        const count = 4000;

        function init3D() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            geometry = new THREE.BufferGeometry();
            const pos = new Float32Array(count * 3);
            geometry.setAttribute('position', new THREE.BufferAttribute(pos, 3));
            
            const mat = new THREE.PointsMaterial({ size: 0.02, color: 0x007AFF, transparent: true, opacity: 0.6 });
            points = new THREE.Points(geometry, mat);
            scene.add(points);
            camera.position.z = 4;
            animate();
        }

        function animate() {
            requestAnimationFrame(animate);
            const time = Date.now() * 0.001;
            const pos = geometry.attributes.position.array;

            for(let i=0; i<count; i++) {
                const i3 = i * 3;
                const t = (i / count) * Math.PI * 2;
                
                if(currentMode === 'flux') {
                    pos[i3] = Math.cos(t + time) * (2 + Math.sin(time * 0.5 + t * 3) * 0.5);
                    pos[i3+1] = Math.sin(t * 2 - time) * 1.5;
                    pos[i3+2] = Math.sin(t + time * 0.8);
                } else if(currentMode === 'vortex') {
                    const r = 2 * Math.sqrt(i/count);
                    pos[i3] = Math.cos(t + time * 2) * r;
                    pos[i3+1] = Math.sin(t + time * 2) * r;
                    pos[i3+2] = Math.tan(t * 0.1) * 0.5;
                } else {
                    const r = 1.8 + (isRunning ? Math.sin(time*2)*0.4 : 0);
                    pos[i3] = Math.cos(t) * Math.sin(time + i) * r;
                    pos[i3+1] = Math.sin(t) * Math.cos(time + i) * r;
                    pos[i3+2] = Math.cos(t) * r;
                }
            }
            geometry.attributes.position.needsUpdate = true;
            points.rotation.y += 0.001;
            renderer.render(scene, camera);
        }

        // --- LÓGICA DE CONTROL ---
        let timeLeft = 25 * 60, isRunning = false, timerId = null;

        function toggleTimer() {
            initAudio(); // Desbloquea el sonido en la primera interacción
            if(isRunning) {
                clearInterval(timerId); stopAtmosphere();
                document.getElementById('startBtn').innerText = "RESUME";
            } else {
                updateAtmosphere();
                timerId = setInterval(() => {
                    timeLeft--; 
                    const m = Math.floor(timeLeft / 60), s = timeLeft % 60;
                    document.getElementById('timer').innerText = `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
                    if(timeLeft <= 0) {
                        clearInterval(timerId); playFinishBell(); stopAtmosphere();
                        isRunning = false; document.getElementById('startBtn').innerText = "START";
                    }
                }, 1000);
                document.getElementById('startBtn').innerText = "PAUSE";
            }
            isRunning = !isRunning;
        }

        function setTimer(m, btn) {
            clearInterval(timerId); isRunning = false;
            timeLeft = m * 60;
            document.getElementById('timer').innerText = `${m}:00`;
            document.querySelectorAll('.t-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById('startBtn').innerText = "START";
        }

        function updateAtmosphere() {
            if(isRunning) playAtmosphere(document.getElementById('soundSelect').value);
        }

        function setMode(m) {
            currentMode = m;
            document.querySelectorAll('.v-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
        }

        window.onload = init3D;
        window.onresize = () => {
            renderer.setSize(window.innerWidth, window.innerHeight);
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
        }
    </script>
</body>
</html>
