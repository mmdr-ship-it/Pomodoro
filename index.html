<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZenDoro | Harmonic Edition</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        :root {
            --bg: #000; --text: #fff; --accent: #007AFF; --danger: #FF3B30;
            --glass: rgba(15, 15, 15, 0.6); --border: rgba(255, 255, 255, 0.08);
        }
        body.theme-dia { 
            --bg: #F5F5F7; --text: #1D1D1F; --glass: rgba(255, 255, 255, 0.7); --border: rgba(0, 0, 0, 0.08); 
            --accent: #0071E3;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: "SF Pro Display", -apple-system, sans-serif; }
        body { background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; transition: 0.8s ease; cursor: crosshair; }
        #canvas-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        .ui-wrapper { position: relative; z-index: 10; height: 100vh; width: 100%; display: flex; justify-content: space-between; padding: 40px; pointer-events: none; }
        
        .panel { 
            background: var(--glass); backdrop-filter: blur(40px); -webkit-backdrop-filter: blur(40px);
            border: 1px solid var(--border); border-radius: 28px; padding: 25px;
            display: flex; flex-direction: column; gap: 10px; pointer-events: all;
            transition: all 0.7s cubic-bezier(0.2, 1, 0.2, 1); width: 240px;
        }
        .panel.collapsed-left { transform: translateX(-350px); opacity: 0; }
        .panel.collapsed-right { transform: translateX(350px); opacity: 0; }

        .center-content { flex-grow: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; position: relative; }
        
        /* Frases Curva Dinámica */
        #quote-container { height: 50px; display: flex; align-items: center; justify-content: center; width: 80%; text-align: center; }
        #dynamic-quote { 
            font-size: 12px; text-transform: uppercase; letter-spacing: 4px; opacity: 0;
            transition: 1.5s cubic-bezier(0.4, 0, 0.2, 1); transform: translateY(15px);
            font-weight: 300; line-height: 1.6;
        }
        #dynamic-quote.visible { opacity: 0.5; transform: translateY(0); }

        #timer { font-size: 8rem; font-weight: 100; letter-spacing: -6px; margin: 5px 0; font-variant-numeric: tabular-nums; transition: 0.5s; pointer-events: none; }
        #timer.overtime { color: var(--danger); text-shadow: 0 0 30px rgba(255, 59, 48, 0.3); }

        /* Botón Start Minimalista */
        .main-btn { 
            pointer-events: all; font-size: 0.75rem; background: var(--text); color: var(--bg);
            border-radius: 40px; padding: 12px 35px; border: none; cursor: pointer; 
            letter-spacing: 3px; font-weight: 600; text-transform: uppercase;
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); margin-top: 20px;
        }
        .main-btn:hover { transform: scale(1.05); opacity: 0.9; box-shadow: 0 10px 20px rgba(0,0,0,0.2); }

        button:not(.main-btn):not(.side-toggle) {
            background: rgba(120, 120, 120, 0.05); border: 1px solid var(--border);
            color: var(--text); padding: 10px; border-radius: 12px; font-size: 10px;
            cursor: pointer; transition: 0.3s; width: 100%; text-align: left;
            text-transform: uppercase; letter-spacing: 1px;
        }
        button.active { background: var(--accent) !important; color: #fff !important; border: none; }

        .side-toggle {
            position: fixed; bottom: 35px; width: 40px; height: 40px; border-radius: 50%;
            border: 1px solid var(--border); background: var(--glass); color: var(--text);
            cursor: pointer; z-index: 100; display: flex; align-items: center; justify-content: center;
        }
        #toggle-left { left: 35px; } #toggle-right { right: 85px; } #toggle-fs { right: 35px; }
        #flash { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; opacity: 0; pointer-events: none; z-index: 1000; }
    </style>
</head>
<body class="theme-noche">
    <div id="flash"></div>
    <div id="canvas-container"></div>
    <button class="side-toggle" id="toggle-left" onclick="togglePanel('left')">‹</button>
    <button class="side-toggle" id="toggle-right" onclick="togglePanel('right')">›</button>
    <button class="side-toggle" id="toggle-fs" onclick="handleFS()">⛶</button>

    <main class="ui-wrapper">
        <aside class="panel" id="panel-left">
            <h3 style="font-size: 9px; opacity: 0.4; letter-spacing: 2px; margin-bottom: 5px;">ESTÉTICA</h3>
            <button onclick="setVisual('vortex', this)" class="v-opt active">Vórtice</button>
            <button onclick="setVisual('dna', this)" class="v-opt">ADN Helix</button>
            <button onclick="setVisual('pulse', this)" class="v-opt">Pulso</button>
            <button onclick="setVisual('chaos', this)" class="v-opt">Caos</button>
            <button onclick="setVisual('cinema', this)" class="v-opt">Cinemático</button>
            <button onclick="setVisual('hydro', this)" class="v-opt">Hidráulico</button>
            <button onclick="setVisual('breath', this)" class="v-opt">Respiración</button>
        </aside>

        <section class="center-content">
            <div id="quote-container">
                <span id="dynamic-quote"></span>
            </div>
            <div id="timer">25:00</div>
            <button class="main-btn" id="startBtn" onclick="handleStart()">Start</button>
        </section>

        <aside class="panel" id="panel-right">
            <h3 style="font-size: 9px; opacity: 0.4; letter-spacing: 2px; margin-bottom: 5px;">SESIÓN</h3>
            <button onclick="handleTime(25, this)" class="t-opt active">25m Pomodoro</button>
            <button onclick="handleTime(45, this)" class="t-opt">45m Focus</button>
            <button onclick="handleTime(5, this)" class="t-opt">5m Break</button>
            <h3 style="font-size: 9px; opacity: 0.4; letter-spacing: 2px; margin: 10px 0 5px 0;">SISTEMA</h3>
            <button onclick="toggleTheme()">Appearance</button>
        </aside>
    </main>

    <script>
        let scene, camera, renderer, points, geometry;
        let vMode = 'vortex';
        const pCount = 11000;
        let mouseX = 0, mouseY = 0, targetMouseX = 0, targetMouseY = 0;

        const quotes = [
            "No es que tengamos poco tiempo, sino que perdemos mucho.",
            "La felicidad de tu vida depende de la calidad de tus pensamientos.",
            "La sencillez es la máxima sofisticación.",
            "Haz cada cosa en la vida como si fuera lo último que hicieses.",
            "El tiempo es la cosa más valiosa que un hombre puede gastar.",
            "La mejor forma de predecir el futuro es creándolo.",
            "Tu tiempo es limitado, no lo malgastes viviendo la vida de otro.",
            "Lo que hacemos en la vida tiene su eco en la eternidad.",
            "No busques que los eventos sucedan como quieres, sino quiérelos como suceden.",
            "El éxito es la capacidad de ir de fracaso en fracaso sin perder el entusiasmo.",
            "La vida es muy simple, pero insistimos en hacerla complicada.",
            "Quien tiene un porqué para vivir, puede soportar casi cualquier cómo.",
            "No te detengas cuando estés cansado, detente cuando hayas terminado.",
            "La paciencia es amarga, pero su fruto es dulce.",
            "La disciplina es el puente entre las metas y los logros.",
            "El único modo de hacer un gran trabajo es amar lo que haces.",
            "La mente que se abre a una nueva idea, jamás volverá a su tamaño original.",
            "Vence al que se vence a sí mismo.",
            "La calma es el poder.",
            "Somos lo que hacemos de forma repetida."
        ];

        function initScene() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.getElementById('canvas-container').appendChild(renderer.domElement);
            
            geometry = new THREE.BufferGeometry();
            const positions = new Float32Array(pCount * 3);
            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            const material = new THREE.PointsMaterial({ size: 0.022, color: 0x007AFF, transparent: true, opacity: 0.7 });
            points = new THREE.Points(geometry, material);
            scene.add(points);
            camera.position.z = 5;

            window.addEventListener('mousemove', (e) => {
                targetMouseX = (e.clientX / window.innerWidth) * 2 - 1;
                targetMouseY = -(e.clientY / window.innerHeight) * 2 + 1;
            });

            renderLoop();
            displayQuote();
        }

        function renderLoop() {
            requestAnimationFrame(renderLoop);
            const time = Date.now() * 0.001;
            mouseX += (targetMouseX * 5 - mouseX) * 0.08;
            mouseY += (targetMouseY * 5 - mouseY) * 0.08;
            const pos = geometry.attributes.position.array;

            for(let i=0; i<pCount; i++) {
                const i3 = i * 3, r = i / pCount, a = r * Math.PI * 2;
                let x, y, z;

                if(vMode === 'vortex') {
                    const d = (i % 110) * 0.045; x = Math.cos(a + time + d) * d; y = Math.sin(a + time + d) * d; z = (i / 110) - 15;
                } else if(vMode === 'dna') {
                    const h = (r - 0.5) * 8; const s = i % 2 === 0 ? 1 : -1;
                    x = Math.cos(h + time) * s * 1.5; y = h; z = Math.sin(h + time) * s * 1.5;
                } else if(vMode === 'pulse') {
                    const s = 2.5 + Math.sin(time * 2 + r * 10) * 0.6; x = Math.cos(a) * s; y = Math.sin(a) * s; z = Math.sin(time + r * 5);
                } else if(vMode === 'chaos') {
                    x = Math.sin(a * time * 0.1) * (2.2 + Math.cos(time + i)); y = Math.cos(a * time * 0.1) * (2.2 + Math.sin(time + i)); z = Math.sin(time * r);
                } else if(vMode === 'cinema') {
                    x = (r - 0.5) * 12; y = Math.sin(x + time) * 2.2 * Math.cos(x * 0.4); z = Math.sin(time * 0.5 + x) * 2.2;
                } else if(vMode === 'hydro') {
                    const fA = a + Math.sin(time + r * 5) * 0.4; const fR = 2.5 + Math.cos(time * 0.5 + r * 8) * 0.3;
                    x = Math.cos(fA) * fR; y = Math.sin(fA) * fR; z = Math.sin(time + i * 0.01) * 3;
                } else { // BREATHING FLOW
                    const breath = (Math.sin(time * 0.8) + 1) / 2;
                    const bR = 1.5 + (breath * 2.5);
                    x = Math.cos(a) * bR + Math.sin(time + i) * 0.1;
                    y = Math.sin(a) * bR + Math.cos(time + i) * 0.1;
                    z = Math.sin(a * 4 + time) * 0.5;
                }

                const dx = x - mouseX, dy = y - mouseY, dist = Math.sqrt(dx*dx + dy*dy);
                const force = Math.max(0, 1.3 - dist);
                pos[i3] = x + (dx / dist) * force * 0.6; pos[i3+1] = y + (dy / dist) * force * 0.6; pos[i3+2] = z;
            }
            geometry.attributes.position.needsUpdate = true;
            points.rotation.y += 0.0005;
            renderer.render(scene, camera);
        }

        let timeLeft = 25 * 60, isRunning = false, timerInterval = null;

        function displayQuote() {
            const el = document.getElementById('dynamic-quote');
            el.classList.remove('visible');
            setTimeout(() => {
                el.innerText = quotes[Math.floor(Math.random() * quotes.length)];
                el.classList.add('visible');
            }, 1000);
        }

        function handleStart() {
            const btn = document.getElementById('startBtn');
            if(isRunning) { clearInterval(timerInterval); btn.innerText = "Start"; isRunning = false; }
            else {
                isRunning = true; btn.innerText = "Pause";
                displayQuote();
                timerInterval = setInterval(() => {
                    timeLeft--;
                    if(timeLeft === 0) { 
                        const f = document.getElementById('flash'); f.style.opacity = "0.5"; 
                        setTimeout(() => f.style.opacity = "0", 300); 
                    }
                    if(timeLeft < 0) document.getElementById('timer').classList.add('overtime');
                    updateDisplay();
                }, 1000);
            }
        }

        function updateDisplay() {
            const absTime = Math.abs(timeLeft); const m = Math.floor(absTime / 60), s = absTime % 60;
            document.getElementById('timer').innerText = `${timeLeft < 0 ? "-" : ""}${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
        }

        function handleTime(m, el) {
            clearInterval(timerInterval); isRunning = false; timeLeft = m * 60;
            document.getElementById('timer').classList.remove('overtime');
            updateDisplay(); document.getElementById('startBtn').innerText = "Start";
            document.querySelectorAll('.t-opt').forEach(b => b.classList.remove('active')); el.classList.add('active');
        }

        function setVisual(mode, el) {
            vMode = mode; document.querySelectorAll('.v-opt').forEach(b => b.classList.remove('active')); el.classList.add('active');
            const colors = {vortex: 0x007AFF, dna: 0xFF3B30, pulse: 0x34C759, chaos: 0xAF52DE, cinema: 0xFF9500, hydro: 0x5AC8FA, breath: 0x00FFC3};
            points.material.color.setHex(colors[mode]);
        }

        function togglePanel(side) {
            const p = document.getElementById(side === 'left' ? 'panel-left' : 'panel-right');
            const isCol = p.classList.toggle(side === 'left' ? 'collapsed-left' : 'collapsed-right');
            document.getElementById(side === 'left' ? 'toggle-left' : 'toggle-right').innerText = isCol ? (side === 'left' ? '›' : '‹') : (side === 'left' ? '‹' : '›');
        }

        function toggleTheme() { document.body.classList.toggle('theme-dia'); }
        function handleFS() { if (!document.fullscreenElement) document.documentElement.requestFullscreen(); else document.exitFullscreen(); }

        window.onload = initScene;
        window.onresize = () => { renderer.setSize(window.innerWidth, window.innerHeight); camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix(); };
    </script>
</body>
</html>
