<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZenDoro | Deep Work</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/howler/2.2.3/howler.min.js"></script>
    <style>
        :root {
            --bg: #121212; /* Un gris muy oscuro en lugar de negro total */
            --text: #ffffff;
            --accent: rgba(255, 255, 255, 0.9);
            --dim: rgba(255, 255, 255, 0.4);
            --orb-color: rgba(255, 255, 255, 0.15);
        }

        /* Temas con más brillo para que no sean "agujeros negros" */
        body.theme-noche { --bg: #0d0d0d; --orb-color: rgba(255, 255, 255, 0.1); }
        body.theme-amanecer { --bg: #161b22; --orb-color: rgba(255, 120, 80, 0.2); --text: #ffe0d0; }
        body.theme-tarde { --bg: #1d1610; --orb-color: rgba(255, 180, 50, 0.2); --text: #ffefd5; }
        body.theme-dia { --bg: #ffffff; --text: #1a1a1a; --dim: rgba(0,0,0,0.3); --orb-color: rgba(0,0,0,0.08); }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', -apple-system, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: background-color 2s ease, color 1s ease;
            overflow: hidden;
        }

        /* SISTEMA DE RESPIRACIÓN */
        .orb-wrapper {
            position: absolute;
            z-index: -1;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .orb {
            width: 300px;
            height: 300px;
            border-radius: 50%;
            background: var(--orb-color);
            transition: all 1s ease;
        }

        /* Modo Círculo: Bordes definidos */
        .mode-circulo { border: 2px solid var(--dim); filter: blur(0px); }
        /* Modo Flujo: Neblina 3D */
        .mode-flujo { border: none; filter: blur(60px); }

        .anim-breathe { animation: breathe 10s infinite ease-in-out; }

        @keyframes breathe {
            0%, 100% { transform: scale(1); opacity: 0.3; }
            50% { transform: scale(1.7); opacity: 0.8; }
        }

        .container { text-align: center; z-index: 10; width: 100%; }
        
        #timer {
            font-size: clamp(5rem, 18vw, 9rem);
            font-weight: 100;
            letter-spacing: -4px;
            margin-bottom: 10px;
        }

        .estoicismo {
            font-size: 0.75rem;
            color: var(--dim);
            margin: 20px auto;
            letter-spacing: 2px;
            text-transform: uppercase;
            max-width: 80%;
        }

        .panel { display: flex; gap: 10px; margin: 10px 0; justify-content: center; flex-wrap: wrap; }

        button, select {
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--dim);
            color: var(--text);
            padding: 6px 12px;
            border-radius: 15px;
            cursor: pointer;
            font-size: 0.65rem;
            text-transform: uppercase;
        }
        button:hover, button.active { border-color: var(--text); background: rgba(255,255,255,0.1); }

        .main-toggle { font-size: 1.5rem; border: none; margin-top: 30px; font-weight: 200; opacity: 0.7; background: none; }

        .session-dots { display: flex; justify-content: center; gap: 8px; margin-bottom: 20px; }
        .dot { width: 5px; height: 5px; border-radius: 50%; background: var(--dim); }
        .dot.filled { background: var(--text); box-shadow: 0 0 8px var(--text); }
    </style>
</head>
<body class="theme-noche">

    <div class="orb-wrapper">
        <div id="visualOrb" class="orb mode-flujo anim-breathe"></div>
    </div>

    <div class="container">
        <div id="sessionDots" class="session-dots"></div>
        <div id="timer">25:00</div>
        <div id="quote" class="estoicismo">"Persiste y resiste."</div>

        <div class="panel">
            <button onclick="setT(25)" class="active">25</button>
            <button onclick="setT(50)">50</button>
            <button onclick="setT(90)">90</button>
            <button onclick="setT(5)">Rest</button>
        </div>

        <div class="panel">
            <select id="ambientSelect" onchange="changeAmbient()">
                <option value="none">🔇 Silencio</option>
                <option value="rain">🌧️ Lluvia</option>
                <option value="waves">🌊 Mar</option>
                <option value="forest">🍃 Bosque</option>
                <option value="cafe">☕ Café</option>
            </select>
            
            <select onchange="document.body.className = 'theme-' + this.value">
                <option value="noche">🌙 Noche</option>
                <option value="amanecer">🌅 Amanecer</option>
                <option value="dia">☀️ Día</option>
                <option value="tarde">🌇 Tarde</option>
            </select>

            <button onclick="toggleVisual()">🌀 Cambiar Visual</button>
        </div>

        <button class="main-toggle" id="startBtn" onclick="toggle()">START</button>
    </div>

    <script>
        let timeLeft = 25 * 60;
        let timerId = null;
        let isRunning = false;
        let ambientSound = null;

        const quotes = ["No es que tengamos poco tiempo, sino que perdemos mucho.", "La felicidad depende de nosotros mismos.", "Dificultades fortalecen la mente.", "Vivir es luchar."];

        // URLs de respaldo más estables
        const soundUrls = {
            bell: 'https://assets.mixkit.co/active_storage/sfx/1070/1070-preview.mp3',
            rain: 'https://www.soundjay.com/nature/sounds/rain-01.mp3',
            waves: 'https://www.soundjay.com/nature/sounds/ocean-wave-1.mp3',
            forest: 'https://www.soundjay.com/nature/sounds/forest-1.mp3',
            cafe: 'https://www.soundjay.com/misc/sounds/coffee-shop-1.mp3'
        };

        let bellSound = new Howl({ src: [soundUrls.bell] });

        function toggleVisual() {
            const orb = document.getElementById('visualOrb');
            if(orb.classList.contains('mode-flujo')) {
                orb.classList.remove('mode-flujo');
                orb.classList.add('mode-circulo');
            } else {
                orb.classList.remove('mode-circulo');
                orb.classList.add('mode-flujo');
            }
        }

        function setT(m) {
            clearInterval(timerId); isRunning = false;
            timeLeft = m * 60;
            updateDisp();
            document.querySelectorAll('.panel button').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById('startBtn').innerText = "START";
        }

        function updateDisp() {
            let m = Math.floor(timeLeft / 60);
            let s = timeLeft % 60;
            document.getElementById('timer').innerText = `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
        }

        function toggle() {
            // Activar contexto de audio (requerido por navegadores)
            if (Howler.state === 'suspended') Howler.ctx.resume();

            if(isRunning) {
                clearInterval(timerId);
                document.getElementById('startBtn').innerText = "RESUME";
            } else {
                timerId = setInterval(() => {
                    timeLeft--;
                    updateDisp();
                    if(timeLeft <= 0) finish();
                }, 1000);
                document.getElementById('startBtn').innerText = "PAUSE";
            }
            isRunning = !isRunning;
        }

        function finish() {
            clearInterval(timerId);
            bellSound.play();
            document.getElementById('sessionDots').innerHTML += '<div class="dot filled"></div>';
            document.getElementById('startBtn').innerText = "RESTART";
        }

        function changeAmbient() {
            if(ambientSound) ambientSound.stop();
            const val = document.getElementById('ambientSelect').value;
            if(val !== 'none') {
                ambientSound = new Howl({ src: [soundUrls[val]], loop: true, volume: 0.3 });
                ambientSound.play();
            }
        }
    </script>
</body>
</html>
