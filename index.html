<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZenDoro Studio Pro | Overtime Edition</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        :root {
            --bg: #000; --text: #fff; --accent: #007AFF; --danger: #FF3B30;
            --glass: rgba(25, 25, 25, 0.7); --border: rgba(255, 255, 255, 0.1);
        }
        body.theme-dia { 
            --bg: #F5F5F7; --text: #1D1D1F; --glass: rgba(255, 255, 255, 0.8); --border: rgba(0, 0, 0, 0.1); 
            --accent: #0071E3;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, "SF Pro Display", sans-serif; }
        body { background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; transition: 0.8s; }
        
        #canvas-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }

        .ui-wrapper {
            position: relative; z-index: 10; height: 100vh; width: 100%;
            display: flex; justify-content: space-between; padding: 30px; gap: 20px;
        }

        .panel { 
            background: var(--glass); backdrop-filter: blur(40px); -webkit-backdrop-filter: blur(40px);
            border: 1px solid var(--border); border-radius: 28px; padding: 25px;
            display: flex; flex-direction: column; gap: 15px; pointer-events: all;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1); width: 280px;
        }

        .panel.collapsed { transform: translateX(-350px); opacity: 0; pointer-events: none; }
        .panel.collapsed-right { transform: translateX(350px); opacity: 0; pointer-events: none; }

        /* TIMER & OVERTIME */
        .center-content { flex-grow: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        #timer { font-size: 9rem; font-weight: 100; letter-spacing: -6px; margin: 10px 0; font-variant-numeric: tabular-nums; transition: color 0.3s; }
        #timer.overtime { color: var(--danger); font-weight: 400; text-shadow: 0 0 20px rgba(255, 59, 48, 0.4); }
        
        #dynamic-quote { font-size: 12px; text-transform: uppercase; letter-spacing: 4px; opacity: 0.5; height: 20px; }

        /* BUTTONS */
        button {
            background: rgba(120, 120, 120, 0.1); border: 1px solid var(--border);
            color: var(--text); padding: 14px; border-radius: 16px; font-size: 11px;
            cursor: pointer; transition: 0.3s; width: 100%; text-align: left;
        }
        button:hover { background: rgba(120, 120, 120, 0.2); }
        button.active { background: var(--accent) !important; color: #fff !important; }

        .main-btn { 
            font-size: 1.2rem; background: var(--text); color: var(--bg); border: none;
            text-align: center; font-weight: 400; letter-spacing: 5px; margin-top: 30px;
            border-radius: 20px; padding: 18px 60px; width: auto; cursor: pointer;
        }

        /* CONTROLES SUTILES */
        .side-toggle {
            position: fixed; bottom: 30px; width: 40px; height: 40px; border-radius: 50%;
            border: 1px solid var(--border); background: var(--glass); color: var(--text);
            cursor: pointer; z-index: 100; display: flex; align-items: center; justify-content: center;
        }
        #toggle-left { left: 30px; }
        #toggle-right { right: 80px; }
        #toggle-fs { right: 30px; }

        /* FLASH EFFECT */
        #flash {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: white; opacity: 0; pointer-events: none; z-index: 1000;
        }
    </style>
</head>
<body class="theme-noche">

    <div id="flash"></div>
    <div id="canvas-container"></div>
    
    <button class="side-toggle" id="toggle-left" onclick="togglePanel('left')">‹</button>
    <button class="side-toggle" id="toggle-right" onclick="togglePanel('right')">›</button>
    <button class="side-toggle" id="toggle-fs" onclick="handleFS()">⛶</button>

    <main class="ui-wrapper">
        <aside class="panel" id="panel-left">
            <h3>Visual Studio</h3>
            <button onclick="setVisual('vortex', this)" class="v-opt active">Vórtice</button>
            <button onclick="setVisual('dna', this)" class="v-opt">ADN Helix</button>
            <button onclick="setVisual('pulse', this)" class="v-opt">Pulso</button>
            <button onclick="setVisual('chaos', this)" class="v-opt">Caos</button>
        </aside>

        <section class="center-content">
            <span id="dynamic-quote">FOCUS MODE</span>
            <div id="timer">25:00</div>
            <button class="main-btn" id="startBtn" onclick="handleStart()">START</button>
        </section>

        <aside class="panel" id="panel-right">
            <h3>Sesión</h3>
            <button onclick="handleTime(25, this)" class="t-opt active">25m Work</button>
            <button onclick="handleTime(45, this)" class="t-opt">45m Focus</button>
            <button onclick="handleTime(90, this)" class="t-opt">90m Deep</button>
            <h3>Descanso</h3>
            <div style="display: flex; gap: 5px;">
                <button onclick="handleTime(5, this)" class="t-opt">5m</button>
                <button onclick="handleTime(15, this)" class="t-opt">15m</button>
            </div>
            <h3 style="margin-top:10px">Interfaz</h3>
            <button onclick="toggleTheme()">Cambiar Tema (D/N)</button>
        </aside>
    </main>

    <script>
        let scene, camera, renderer, points, geometry;
        let vMode = 'vortex';
        const pCount = 8000;

        function initScene() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            geometry = new THREE.BufferGeometry();
            const positions = new Float32Array(pCount * 3);
            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            const material = new THREE.PointsMaterial({ size: 0.03, color: 0x007AFF, transparent: true, opacity: 0.6 });
            points = new THREE.Points(geometry, material);
            scene.add(points);
            camera.position.z = 5;
            renderLoop();
        }

        function renderLoop() {
            requestAnimationFrame(renderLoop);
            const time = Date.now() * 0.001;
            const pos = geometry.attributes.position.array;
            for(let i=0; i<pCount; i++) {
                const i3 = i * 3, r = i / pCount, a = r * Math.PI * 2;
                if(vMode === 'vortex') {
                    const d = (i % 80) * 0.06;
                    pos[i3] = Math.cos(a + time + d) * d;
                    pos[i3+1] = Math.sin(a + time + d) * d;
                    pos[i3+2] = (i / 80) - 20;
                } else if(vMode === 'dna') {
                    const h = (r - 0.5) * 8;
                    const spiral = i % 2 === 0 ? 1 : -1;
                    pos[i3] = Math.cos(h + time) * spiral * 1.5;
                    pos[i3+1] = h;
                    pos[i3+2] = Math.sin(h + time) * spiral * 1.5;
                } else if(vMode === 'pulse') {
                    const s = 2 + Math.sin(time * 2 + r * 10) * 0.6;
                    pos[i3] = Math.cos(a) * s;
                    pos[i3+1] = Math.sin(a) * s;
                    pos[i3+2] = Math.sin(time + r * 5);
                } else {
                    pos[i3] = Math.sin(a + time) * (3 * r);
                    pos[i3+1] = Math.cos(a - time) * (3 * r);
                    pos[i3+2] = Math.tan(r + time) * 0.2;
                }
            }
            geometry.attributes.position.needsUpdate = true;
            points.rotation.y += 0.001;
            renderer.render(scene, camera);
        }

        let timeLeft = 25 * 60, isRunning = false, timerInterval = null, isOvertime = false;

        function handleStart() {
            const btn = document.getElementById('startBtn');
            if(isRunning) {
                clearInterval(timerInterval);
                btn.innerText = "RESUME";
                isRunning = false;
            } else {
                isRunning = true;
                btn.innerText = "PAUSE";
                timerInterval = setInterval(() => {
                    timeLeft--;
                    if(timeLeft === 0) triggerFlash();
                    if(timeLeft < 0) {
                        isOvertime = true;
                        document.getElementById('timer').classList.add('overtime');
                    }
                    updateDisplay();
                }, 1000);
            }
        }

        function updateDisplay() {
            const absTime = Math.abs(timeLeft);
            const m = Math.floor(absTime / 60);
            const s = absTime % 60;
            const sign = timeLeft < 0 ? "-" : "";
            document.getElementById('timer').innerText = `${sign}${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
        }

        function triggerFlash() {
            const f = document.getElementById('flash');
            f.style.opacity = "0.5";
            setTimeout(() => f.style.opacity = "0", 200);
        }

        function handleTime(m, el) {
            clearInterval(timerInterval);
            isRunning = false; isOvertime = false;
            timeLeft = m * 60;
            document.getElementById('timer').classList.remove('overtime');
            updateDisplay();
            document.getElementById('startBtn').innerText = "START";
            document.querySelectorAll('.t-opt').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
        }

        function setVisual(mode, el) {
            vMode = mode;
            document.querySelectorAll('.v-opt').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
            const colors = {vortex: 0x007AFF, dna: 0xFF3B30, pulse: 0x34C759, chaos: 0xAF52DE};
            points.material.color.setHex(colors[mode]);
        }

        function togglePanel(side) {
            const p = document.getElementById(side === 'left' ? 'panel-left' : 'panel-right');
            const b = document.getElementById(side === 'left' ? 'toggle-left' : 'toggle-right');
            const isCol = p.classList.toggle(side === 'left' ? 'collapsed' : 'collapsed-right');
            b.innerText = isCol ? (side === 'left' ? '›' : '‹') : (side === 'left' ? '‹' : '›');
        }

        function toggleTheme() {
            document.body.classList.toggle('theme-dia');
        }

        function handleFS() {
            if (!document.fullscreenElement) document.documentElement.requestFullscreen();
            else document.exitFullscreen();
        }

        window.onload = initScene;
        window.onresize = () => {
            renderer.setSize(window.innerWidth, window.innerHeight);
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
        };
    </script>
</body>
</html>
