<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZenDoro Studio Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        :root {
            --bg: #000; --text: #fff; --accent: #007AFF;
            --panel: rgba(28, 28, 30, 0.7); --border: rgba(255, 255, 255, 0.1);
        }
        body.theme-dia { --bg: #F5F5F7; --text: #1D1D1F; --panel: rgba(255, 255, 255, 0.8); --border: rgba(0, 0, 0, 0.1); }
        body.theme-atardecer { --bg: #1C151B; --accent: #FF3B30; }
        body.theme-nublado { --bg: #2C2C2E; --accent: #8E8E93; }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, sans-serif; }
        body { background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; transition: 1s; }
        
        #canvas-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }

        .app-layout {
            position: relative; z-index: 10; height: 100vh; width: 100%;
            display: grid; grid-template-columns: 260px 1fr 280px; padding: 25px; gap: 20px;
        }

        .panel { 
            background: var(--panel); backdrop-filter: blur(30px); 
            border: 1px solid var(--border); border-radius: 20px; padding: 20px;
            display: flex; flex-direction: column; gap: 15px;
        }

        /* TIPOGRAFÍA Y UI */
        h3 { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; opacity: 0.5; margin-bottom: 5px; }
        #timer { font-size: 7.5rem; font-weight: 200; letter-spacing: -4px; margin: 15px 0; font-variant-numeric: tabular-nums; }
        .quote { font-size: 13px; opacity: 0.6; font-style: italic; min-height: 40px; }

        button, select {
            background: rgba(255,255,255,0.05); border: 1px solid var(--border);
            color: var(--text); padding: 12px; border-radius: 12px; font-size: 12px;
            cursor: pointer; transition: 0.2s; width: 100%; text-align: left;
        }
        button:hover { background: rgba(255,255,255,0.1); }
        button.active { background: var(--text); color: var(--bg); font-weight: 600; }

        .main-btn { 
            font-size: 1.5rem; background: var(--accent); color: #fff; border: none;
            text-align: center; font-weight: 300; letter-spacing: 3px; margin-top: 20px;
        }

        .session-dots { display: flex; gap: 6px; justify-content: center; margin-top: auto; }
        .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--border); }
        .dot.fill { background: var(--accent); box-shadow: 0 0 10px var(--accent); }

        .center { display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
    </style>
</head>
<body class="theme-noche">

    <div id="canvas-container"></div>

    <main class="app-layout">
        <aside class="panel">
            <h3>Visual Studio</h3>
            <button onclick="changeVisual('ring')" class="v-btn active">Anillo Atómico</button>
            <button onclick="changeVisual('sphere')" class="v-btn">Esfera de Energía</button>
            <button onclick="changeVisual('cloud')" class="v-btn">Neblina Profunda</button>
            
            <h3 style="margin-top:20px">Sesiones</h3>
            <div id="sessionDots" class="session-dots"></div>
        </aside>

        <section class="center">
            <div id="timer">25:00</div>
            <div id="quote" class="quote">"La disciplina es libertad."</div>
            <div style="width: 280px;">
                <button class="main-btn" id="startBtn" onclick="toggleTimer()">START</button>
            </div>
        </section>

        <aside class="panel">
            <h3>Focus Session</h3>
            <button onclick="setTimer(25, this)" class="t-btn active">25m Soft Focus</button>
            <button onclick="setTimer(45, this)" class="t-btn">45m Focus</button>
            <button onclick="setTimer(90, this)" class="t-btn">90m Deep Work</button>

            <h3>Rest Break</h3>
            <select id="restSelect">
                <option value="5">5 min (Micro)</option>
                <option value="10">10 min (Normal)</option>
                <option value="15">15 min (Long)</option>
            </select>

            <h3 style="margin-top:15px">Ambience</h3>
            <select id="soundSelect" onchange="updateSound()">
                <option value="none">Silence</option>
                <option value="white">White Noise</option>
                <option value="zen">Zen Frequency</option>
            </select>

            <select onchange="updateTheme(this.value)" style="margin-top:10px">
                <option value="noche">Midnight</option>
                <option value="dia">Studio Light</option>
                <option value="atardecer">Sunset</option>
                <option value="nublado">Cloudy</option>
            </select>
        </aside>
    </main>

    <script>
        // --- MOTOR DE SONIDO (PRO GENERATIVO) ---
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        let noiseNode = null;

        function playNoise(type) {
            stopNoise();
            const bufferSize = audioCtx.sampleRate * 2;
            const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;

            noiseNode = audioCtx.createBufferSource();
            noiseNode.buffer = buffer;
            noiseNode.loop = true;
            const filter = audioCtx.createBiquadFilter();
            filter.type = "lowpass";
            filter.frequency.value = (type === 'white') ? 800 : 300;
            const gain = audioCtx.createGain();
            gain.gain.value = 0.03;
            noiseNode.connect(filter); filter.connect(gain); gain.connect(audioCtx.destination);
            noiseNode.start();
        }

        function stopNoise() { if(noiseNode) { noiseNode.stop(); noiseNode = null; } }

        function playBell() {
            const osc = audioCtx.createOscillator(), gain = audioCtx.createGain();
            osc.type = 'sine'; osc.frequency.setValueAtTime(440, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(110, audioCtx.currentTime + 3);
            gain.gain.setValueAtTime(0.5, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 4);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 4);
        }

        // --- MOTOR 3D (DYNAMIC ORB) ---
        let scene, camera, renderer, points, geometry;
        let mode = 'ring';
        const count = 3000;

        function init3D() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            geometry = new THREE.BufferGeometry();
            const pos = new Float32Array(count * 3);
            geometry.setAttribute('position', new THREE.BufferAttribute(pos, 3));
            
            const mat = new THREE.PointsMaterial({ size: 0.03, color: 0x007AFF, transparent: true, opacity: 0.8 });
            points = new THREE.Points(geometry, mat);
            scene.add(points);
            camera.position.z = 5;
            animate();
        }

        function animate() {
            requestAnimationFrame(animate);
            const time = Date.now() * 0.001;
            const pos = geometry.attributes.position.array;
            const pulse = isRunning ? Math.sin(time * 1.5) * 0.5 : 0;

            for(let i=0; i<count; i++) {
                const i3 = i * 3;
                const angle = (i / count) * Math.PI * 2;
                if(mode === 'ring') {
                    const r = 2 + pulse + Math.sin(time + angle * 4) * 0.1;
                    pos[i3] = Math.cos(angle) * r;
                    pos[i3+1] = Math.sin(angle) * r;
                    pos[i3+2] = Math.sin(time + i) * 0.2;
                } else if(mode === 'sphere') {
                    const phi = Math.acos(-1 + (2 * i) / count);
                    const theta = Math.sqrt(count * Math.PI) * phi;
                    const r = 2 + pulse;
                    pos[i3] = r * Math.cos(theta) * Math.sin(phi);
                    pos[i3+1] = r * Math.sin(theta) * Math.sin(phi);
                    pos[i3+2] = r * Math.cos(phi);
                } else {
                    pos[i3] = Math.cos(angle) * (1 + Math.random() * (2 + pulse));
                    pos[i3+1] = Math.sin(angle) * (1 + Math.random() * (2 + pulse));
                    pos[i3+2] = (Math.random() - 0.5) * 2;
                }
            }
            geometry.attributes.position.needsUpdate = true;
            points.rotation.y += 0.002;
            renderer.render(scene, camera);
        }

        // --- LÓGICA DE CONTROL ---
        let timeLeft = 25 * 60, isRunning = false, timerId = null;

        function toggleTimer() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            if(isRunning) {
                clearInterval(timerId); stopNoise();
                document.getElementById('startBtn').innerText = "RESUME";
            } else {
                updateSound();
                timerId = setInterval(() => {
                    timeLeft--; updateDisplay();
                    if(timeLeft <= 0) {
                        clearInterval(timerId); playBell(); stopNoise();
                        document.getElementById('sessionDots').innerHTML += '<div class="dot fill"></div>';
                        isRunning = false; document.getElementById('startBtn').innerText = "START";
                    }
                }, 1000);
                document.getElementById('startBtn').innerText = "PAUSE";
            }
            isRunning = !isRunning;
        }

        function setTimer(m, btn) {
            clearInterval(timerId); isRunning = false;
            timeLeft = m * 60; updateDisplay();
            document.querySelectorAll('.t-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById('startBtn').innerText = "START";
        }

        function updateDisplay() {
            const m = Math.floor(timeLeft / 60), s = timeLeft % 60;
            document.getElementById('timer').innerText = `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
        }

        function updateTheme(t) {
            document.body.className = 'theme-' + t;
            const colors = { noche: 0x007AFF, dia: 0x0071E3, atardecer: 0xFF3B30, nublado: 0x8E8E93 };
            points.material.color.setHex(colors[t]);
        }

        function changeVisual(m) {
            mode = m;
            document.querySelectorAll('.v-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
        }

        function updateSound() {
            const s = document.getElementById('soundSelect').value;
            if(isRunning && s !== 'none') playNoise(s); else stopNoise();
        }

        window.onload = init3D;
    </script>
</body>
</html>
